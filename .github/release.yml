changelog:
  exclude:
    labels:
      - chore
      - duplicate
      - invalid
      - question
      - wontfix
  categories:
    - title: "🚀 Features"
      labels:
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
    - title: "📚 Documentation"
      labels:
        - documentation
    - title: "🛠 Maintenance"
      labels:
        - chore
