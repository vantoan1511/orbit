name: Release Resources

on:
  push:
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'neutralino.config.json'
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install Neutralino CLI
        run: npm install -g @neutralinojs/neu
      - name: Build
        run: neu build
      - name: Get Version
        id: version
        run: |
          $version = node -p "require('./package.json').version"
          echo "VERSION=$version" >> $env:GITHUB_ENV
      - name: Create Tag & Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: resources-v${{ env.VERSION }}
          files: dist/orbit/resources.neu
      - name: Update Manifest
        run: |
          node scripts/generate-manifest.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update-manifest.json
          # Check if there are changes before committing
          if (git diff --cached --quiet) {
            echo "No changes to commit"
          } else {
            git commit -m "chore: update manifest for resources-v${{ env.VERSION }} [skip ci]"
            git push
          }
