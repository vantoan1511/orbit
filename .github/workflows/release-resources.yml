name: Release Resources

on:
  push:
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'neutralino.config.json'
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install Neutralino CLI
        run: npm install -g @neutralinojs/neu
      - name: Build
        run: neu build
      - name: Get Version
        id: version
        run: |
          $version = node -p "require('./package.json').version"
          echo "VERSION=$version" >> $env:GITHUB_ENV
      - name: Create Tag & Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: resources-v${{ env.VERSION }}
          files: dist/orbit/resources.neu
      - name: Update Manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          $max_retries = 5
          $retry_count = 0
          $success = $false
          
          while ($retry_count -lt $max_retries) {
            git fetch origin main
            git reset --hard origin/main
            
            node scripts/generate-manifest.js
            git add update-manifest.json
            
            if (git diff --cached --quiet) {
              echo "No changes to commit"
              $success = $true
              break
            }
            
            git commit -m "chore: update manifest for resources-v${{ env.VERSION }} [skip ci]"
            git push origin HEAD:main
            if ($LASTEXITCODE -eq 0) {
              $success = $true
              break
            }
            
            echo "Push failed, retrying in 3 seconds..."
            Start-Sleep -Seconds 3
            $retry_count++
          }
          
          if (-not $success) {
            echo "Failed to push after $max_retries retries"
            exit 1
          }
