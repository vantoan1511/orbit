name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Dependencies
        run: npm install
      - name: Install Neutralino CLI
        run: npm install -g @neutralinojs/neu
      - name: Build Resources & Neutralino Wrapper
        run: |
          neu update
          neu build
      - name: Build Engine and Updater
        run: |
          cd core
          cargo build --release
          cd ..
          New-Item -ItemType Directory -Force -Path dist\orbit\bin
          copy core\target\release\orbit-engine.exe dist\orbit\bin\
          copy core\target\release\orbit-updater.exe dist\orbit\bin\
      - name: Package Installer
        run: npm run package
      - name: Package Update Zip
        run: |
          cd dist\orbit
          Compress-Archive -Path resources.neu, bin -DestinationPath ..\orbit-update.zip
      - name: Get Version
        id: version
        run: |
          $version = node -p "require('./package.json').version"
          echo "VERSION=$version" >> $env:GITHUB_ENV
      - name: Create Tag & Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            dist/Orbit-Setup-${{ env.VERSION }}.exe
            dist/orbit-update.zip
      - name: Update Manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          $max_retries = 5
          $retry_count = 0
          $success = $false
          
          while ($retry_count -lt $max_retries) {
            git fetch origin main
            git reset --hard origin/main
            
            node scripts/generate-manifest.js
            git add update-manifest.json
            
            if (git diff --cached --quiet) {
              echo "No changes to commit"
              $success = $true
              break
            }
            
            git commit -m "chore: update manifest for v${{ env.VERSION }} [skip ci]"
            git push origin HEAD:main
            if ($LASTEXITCODE -eq 0) {
              $success = $true
              break
            }
            
            echo "Push failed, retrying in 3 seconds..."
            Start-Sleep -Seconds 3
            $retry_count++
          }
          
          if (-not $success) {
            echo "Failed to push after $max_retries retries"
            exit 1
          }
