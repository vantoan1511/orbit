apiVersion: v1
kind: Namespace
metadata:
  name: orbit-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment
  namespace: orbit-test
  labels:
    app: test-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: test-deployment
  template:
    metadata:
      labels:
        app: test-deployment
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: test-statefulset
  namespace: orbit-test
spec:
  serviceName: "nginx"
  replicas: 2
  selector:
    matchLabels:
      app: test-statefulset
  template:
    metadata:
      labels:
        app: test-statefulset
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: web
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: test-daemonset
  namespace: orbit-test
  labels:
    app: test-daemonset
spec:
  selector:
    matchLabels:
      name: test-daemonset
  template:
    metadata:
      labels:
        name: test-daemonset
    spec:
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      containers:
      - name: fluentd
        image: quay.io/fluentd_elasticsearch/fluentd:v3.0.1
---
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: test-replicaset
  namespace: orbit-test
  labels:
    app: test-replicaset
spec:
  replicas: 2
  selector:
    matchLabels:
      tier: frontend
  template:
    metadata:
      labels:
        tier: frontend
    spec:
      containers:
      - name: guestbook
        image: qinqon/guestbook:v0.1
---
apiVersion: batch/v1
kind: Job
metadata:
  name: test-job
  namespace: orbit-test
spec:
  template:
    spec:
      containers:
      - name: pi
        image: perl:5.34.0
        command: ["perl",  "-Mbignum=bpi", "-wle", "print bpi(2000)"]
      restartPolicy: Never
  backoffLimit: 4
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: test-cronjob
  namespace: orbit-test
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: hello
            image: busybox:1.28
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - date; echo Hello from Orbit test!
          restartPolicy: OnFailure
---
apiVersion: v1
kind: Service
metadata:
  name: test-clusterip-service
  namespace: orbit-test
  labels:
    app: test-clusterip-service
spec:
  type: ClusterIP
  selector:
    app: test-deployment
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: test-nodeport-service
  namespace: orbit-test
  labels:
    app: test-nodeport-service
spec:
  type: NodePort
  selector:
    app: test-deployment
  ports:
  - name: http
    port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: test-loadbalancer-pending-service
  namespace: orbit-test
  labels:
    app: test-loadbalancer-pending-service
spec:
  type: LoadBalancer
  selector:
    app: test-deployment
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: test-loadbalancer-active-service
  namespace: orbit-test
  labels:
    app: test-loadbalancer-active-service
spec:
  type: LoadBalancer
  selector:
    app: test-deployment
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
status:
  loadBalancer:
    ingress:
    - ip: 192.168.1.100
---
apiVersion: v1
kind: Service
metadata:
  name: test-externalname-service
  namespace: orbit-test
spec:
  type: ExternalName
  externalName: my.database.example.com
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-configmap
  namespace: orbit-test
  labels:
    app: test-app
    env: development
data:
  database.url: "postgresql://localhost:5432/db"
  app.properties: |
    server.port=8080
    logging.level.org.springframework=INFO
  settings.json: '{"theme": "dark", "notifications": true}'
---
apiVersion: v1
kind: Secret
metadata:
  name: test-opaque-secret
  namespace: orbit-test
  labels:
    app: test-app
type: Opaque
data:
  api-key: dGVzdC1hcGkta2V5LXZhbHVl
  db-password: c3VwZXItc2VjcmV0LXBhc3N3b3Jk
---
apiVersion: v1
kind: Secret
metadata:
  name: test-tls-secret
  namespace: orbit-test
type: kubernetes.io/tls
data:
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCg==
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCg==
